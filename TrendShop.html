<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TrendShop 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#080808; --surface:#111; --card:#161616; --border:#222;
  --text:#f2f2f2; --muted:#666; --accent:#ff2d55; --accent2:#00f5d4;
  --tech:#3d9eff; --home:#ffb340; --fashion:#bf5af2; --beauty:#ff6b9d;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* noise texture overlay */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4;}

/* ── HEADER ── */
.site-header{position:relative;text-align:center;padding:44px 16px 0;}

/* Hidden admin cube - top right */
.admin-cube{
  position:absolute;top:16px;right:16px;
  width:28px;height:28px;
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--muted);
  transition:border-color .2s,color .2s;
  z-index:50;
}
.admin-cube:hover{border-color:var(--accent);color:var(--accent);}

.logo-wrap{
  width:80px;height:80px;border-radius:50%;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:36px;
  animation:pulse 3s ease-in-out infinite alternate;
}
@keyframes pulse{from{box-shadow:0 0 20px rgba(255,45,85,.3);}to{box-shadow:0 0 50px rgba(255,45,85,.7),0 0 80px rgba(0,245,212,.2);}}

.site-title{
  font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:5px;
  background:linear-gradient(135deg,#fff 30%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.site-sub{color:var(--muted);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:6px;}
.live-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.2);
  border-radius:20px;padding:4px 14px;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-top:12px;
}
.blink{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.admin-on{display:none;margin-top:8px;align-items:center;justify-content:center;gap:6px;background:rgba(0,245,212,.08);border:1px solid rgba(0,245,212,.2);border-radius:20px;padding:4px 14px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);}

/* ── SEARCH ── */
.search-wrap{padding:20px 16px 0;max-width:600px;margin:0 auto;}
.search-box{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:50px;padding:13px 20px 13px 46px;
  color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-box:focus{border-color:rgba(255,45,85,.5);box-shadow:0 0 0 3px rgba(255,45,85,.08);}
.search-box::placeholder{color:var(--muted);}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}

/* ── TABS ── */
.tabs-wrap{padding:16px 16px 0;max-width:600px;margin:0 auto;}
.tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex-shrink:0;border-radius:12px;padding:9px 18px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;
  background:var(--card);border:1px solid var(--border);color:var(--muted);
}
.tab:hover{transform:scale(1.04);}
.tab.active{color:#000;border-color:transparent;}
.tab[data-cat="all"].active   {background:#fff;}
.tab[data-cat="tech"].active  {background:var(--tech);}
.tab[data-cat="home"].active  {background:var(--home);}
.tab[data-cat="fashion"].active{background:var(--fashion);color:#fff;}
.tab[data-cat="beauty"].active {background:var(--beauty);color:#fff;}

/* ── MAGAZINE GRID ── */
.grid-wrap{padding:20px 16px 100px;max-width:600px;margin:0 auto;}

.mag-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-auto-rows:auto;
  gap:10px;
}

/* featured = full width */
.pcard.featured{grid-column:span 2;}
.pcard.tall{grid-row:span 2;}

.pcard{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;overflow:hidden;
  text-decoration:none;color:var(--text);
  display:flex;flex-direction:column;
  position:relative;
  opacity:0;transform:translateY(16px);
  animation:fadeUp .4s ease forwards;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  min-height:110px;
}
.pcard:hover{transform:translateY(-3px) scale(1.01);border-color:rgba(255,255,255,.12);box-shadow:0 10px 40px rgba(0,0,0,.5);}
.pcard:active{transform:scale(.97);}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* color accent top strip */
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--strip-color,#888),transparent);}

.pcard-inner{padding:16px;display:flex;flex-direction:column;flex:1;gap:6px;}

.pcard-cat{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
}
.pcard[data-cat="tech"]    .pcard-cat{color:var(--tech);}
.pcard[data-cat="home"]    .pcard-cat{color:var(--home);}
.pcard[data-cat="fashion"] .pcard-cat{color:var(--fashion);}
.pcard[data-cat="beauty"]  .pcard-cat{color:var(--beauty);}

.pcard-name{font-size:14px;font-weight:700;line-height:1.35;flex:1;}
.pcard.featured .pcard-name{font-size:18px;}

.pcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.pcard-tag{font-size:10px;color:var(--muted);}

.pcard-arrow{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
  transition:background .2s,transform .2s;
}
.pcard[data-cat="tech"]    .pcard-arrow{background:rgba(61,158,255,.12);color:var(--tech);}
.pcard[data-cat="home"]    .pcard-arrow{background:rgba(255,179,64,.12);color:var(--home);}
.pcard[data-cat="fashion"] .pcard-arrow{background:rgba(191,90,242,.12);color:var(--fashion);}
.pcard[data-cat="beauty"]  .pcard-arrow{background:rgba(255,107,157,.12);color:var(--beauty);}

.pcard:hover .pcard-arrow{transform:rotate(-45deg);}
.pcard[data-cat="tech"]:hover    .pcard-arrow{background:var(--tech);color:#000;}
.pcard[data-cat="home"]:hover    .pcard-arrow{background:var(--home);color:#000;}
.pcard[data-cat="fashion"]:hover .pcard-arrow{background:var(--fashion);color:#fff;}
.pcard[data-cat="beauty"]:hover  .pcard-arrow{background:var(--beauty);color:#fff;}

.hot-badge{
  position:absolute;top:12px;right:12px;
  background:var(--accent);color:#fff;
  font-size:8px;font-weight:700;letter-spacing:1px;
  padding:3px 8px;border-radius:20px;text-transform:uppercase;
}

/* loading / empty */
.no-results{text-align:center;padding:60px 20px;color:var(--muted);}
.no-results span{font-size:40px;display:block;margin-bottom:12px;}

/* skeleton */
.skel{background:linear-gradient(90deg,var(--card) 25%,#1e1e1e 50%,var(--card) 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:18px;min-height:120px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── ADMIN LOGIN MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);backdrop-filter:blur(10px);
  z-index:500;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:32px 24px;width:100%;max-width:340px;
  text-align:center;
}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;margin-bottom:4px;}
.modal p{color:var(--muted);font-size:12px;margin-bottom:24px;}
.mf{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:12px;color:var(--text);padding:12px 16px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;margin-bottom:10px;transition:border-color .2s;
}
.mf:focus{border-color:var(--accent);}
.m-login-btn{
  width:100%;background:linear-gradient(135deg,var(--accent),#ff6b8a);
  border:none;border-radius:12px;color:#fff;padding:13px;
  font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:transform .2s;margin-top:2px;
}
.m-login-btn:hover{transform:scale(1.02);}
.m-err{color:var(--accent);font-size:12px;margin-top:8px;min-height:16px;}
.m-close{
  background:none;border:none;color:var(--muted);
  font-size:12px;font-family:'DM Sans',sans-serif;
  cursor:pointer;margin-top:14px;text-decoration:underline;
  display:block;width:100%;text-align:center;
}
.m-close:hover{color:var(--text);}

/* ── EDIT PANEL ── */
.edit-panel{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.9);backdrop-filter:blur(10px);
  z-index:600;overflow-y:auto;
}
.edit-panel.open{display:flex;align-items:flex-start;justify-content:center;padding:20px 14px 40px;}
.edit-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;padding:24px;width:100%;max-width:520px;margin:auto;
}
.edit-box h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;}
.edit-box>p{color:var(--muted);font-size:12px;margin-bottom:16px;}

.fetch-all-btn{
  width:100%;background:rgba(0,245,212,.07);
  border:1px solid rgba(0,245,212,.25);
  color:var(--accent2);border-radius:12px;padding:13px;
  font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;
  cursor:pointer;margin-bottom:18px;transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.fetch-all-btn:hover{background:rgba(0,245,212,.14);}
.fetch-all-btn:disabled{opacity:.45;cursor:not-allowed;}

.edit-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;}
.edit-tabs::-webkit-scrollbar{display:none;}
.etab{
  flex-shrink:0;border:1px solid var(--border);border-radius:8px;
  padding:7px 14px;font-size:12px;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  background:var(--card);color:var(--muted);transition:all .15s;
}
.etab.active{border-color:var(--accent);color:var(--accent);background:rgba(255,45,85,.08);}

.eblock{display:none;}
.eblock.active{display:block;}

.elist{display:flex;flex-direction:column;gap:10px;max-height:50vh;overflow-y:auto;padding-right:4px;}
.elist::-webkit-scrollbar{width:3px;}
.elist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.eitem{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;}
.eitem-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.eitem-num{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);}
.eitem-acts{display:flex;gap:6px;}

.fbtn{
  background:rgba(0,245,212,.07);border:1px solid rgba(0,245,212,.2);
  color:var(--accent2);border-radius:7px;padding:3px 10px;
  font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;
}
.fbtn:hover{background:rgba(0,245,212,.18);}
.fbtn:disabled{opacity:.4;cursor:not-allowed;}

.dbtn{
  background:rgba(255,45,85,.07);border:1px solid rgba(255,45,85,.2);
  color:var(--accent);border-radius:7px;padding:3px 10px;
  font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.dbtn:hover{background:rgba(255,45,85,.2);}

.ei{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:9px 12px;
  font-size:12px;font-family:'DM Sans',sans-serif;
  margin-bottom:7px;outline:none;transition:border-color .2s;
}
.ei:focus{border-color:var(--accent);}
.ei:last-of-type{margin-bottom:0;}

.hot-row{display:flex;align-items:center;gap:7px;margin-top:6px;}
.hot-row label{font-size:11px;color:var(--muted);cursor:pointer;}
.hot-row input[type=checkbox]{width:auto;margin:0;accent-color:var(--accent);cursor:pointer;}

.feat-row{display:flex;align-items:center;gap:7px;margin-top:6px;}
.feat-row label{font-size:11px;color:var(--muted);cursor:pointer;}
.feat-row input[type=checkbox]{width:auto;margin:0;accent-color:var(--accent2);cursor:pointer;}

.add-btn{
  width:100%;background:rgba(0,245,212,.05);
  border:1px dashed rgba(0,245,212,.2);color:var(--accent2);
  border-radius:10px;padding:11px;font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:700;
  cursor:pointer;margin-top:10px;transition:background .2s;
}
.add-btn:hover{background:rgba(0,245,212,.1);}

.edit-actions{display:flex;gap:10px;margin-top:20px;}
.save-btn{
  flex:1;background:linear-gradient(135deg,var(--accent),#ff6b8a);
  border:none;border-radius:12px;color:#fff;padding:14px;
  font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:transform .2s;
}
.save-btn:hover{transform:scale(1.02);}
.cancel-btn{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;color:var(--muted);padding:14px 18px;
  font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;
}
.logout-row{text-align:center;margin-top:14px;}
.logout-lnk{background:none;border:none;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:underline;}
.logout-lnk:hover{color:var(--accent);}

/* category editor */
.cat-edit-list{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.cat-edit-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;}
.cat-edit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cat-edit-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent2);}
.cat-color-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.cat-color-row label{font-size:11px;color:var(--muted);flex-shrink:0;}
.cat-color-input{width:36px;height:30px;border:1px solid var(--border);border-radius:7px;background:var(--bg);cursor:pointer;padding:2px;}
.cat-move-btns{display:flex;gap:4px;}
.move-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.move-btn:hover{background:rgba(255,255,255,.12);color:var(--text);}
.add-cat-btn{width:100%;background:rgba(255,45,85,.05);border:1px dashed rgba(255,45,85,.2);color:var(--accent);border-radius:10px;padding:11px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:background .2s;}
.add-cat-btn:hover{background:rgba(255,45,85,.1);}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,245,212,.3);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{text-align:center;color:var(--muted);font-size:11px;padding:0 0 20px;letter-spacing:.5px;}
</style>
</head>
<body>

<!-- MAIN PAGE -->
<div class="site-header">
  <!-- Hidden admin cube top-right -->
  <div class="admin-cube" id="adminCube" onclick="openLoginModal()" title="Admin">⬛</div>

  <div class="logo-wrap">🛍️</div>
  <div class="site-title">TrendShop</div>
  <div class="site-sub">Curated finds · Best prices</div>
  <div class="live-pill"><span class="blink"></span>Updated Today</div>
  <div class="admin-on" id="adminOn">⚡ Admin Mode</div>
</div>

<!-- SEARCH -->
<div class="search-wrap" style="position:relative;">
  <span class="search-icon">🔍</span>
  <input class="search-box" id="searchBox" type="text" placeholder="Search products…" oninput="onSearch()"/>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs" id="tabsEl">
    <button class="tab active" data-cat="all">🌟 All</button>
    <button class="tab" data-cat="tech">⚡ Tech</button>
    <button class="tab" data-cat="home">🏠 Home</button>
    <button class="tab" data-cat="fashion">👗 Fashion</button>
    <button class="tab" data-cat="beauty">💄 Beauty</button>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="mag-grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <span>🔍</span>No products found
  </div>
</div>

<footer>Made with ❤️ · TrendShop</footer>

<!-- ADMIN LOGIN MODAL -->
<div class="modal-bg" id="loginModal">
  <div class="modal">
    <h3>Admin Login</h3>
    <p>Enter your credentials to edit</p>
    <input class="mf" id="mEmail" type="email" placeholder="Email"/>
    <input class="mf" id="mPass" type="password" placeholder="Password"/>
    <button class="m-login-btn" onclick="doLogin()">Sign In →</button>
    <div class="m-err" id="mErr"></div>
    <button class="m-close" onclick="closeLoginModal()">Cancel</button>
  </div>
</div>

<!-- EDIT PANEL -->
<div class="edit-panel" id="editPanel">
  <div class="edit-box">
    <h2 id="editPanelTitle">Edit</h2>
    <p id="editPanelSub">Fetch real names from AliExpress links automatically.</p>

    <!-- Mode switcher -->
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="etab active" id="modeTabProducts" onclick="switchEditMode('products')">📦 Products</button>
      <button class="etab" id="modeTabCats" onclick="switchEditMode('categories')">🗂 Categories</button>
    </div>

    <!-- Products section -->
    <div id="productsEditSection">
      <button class="fetch-all-btn" id="fetchAllBtn" onclick="fetchAllNames()">
        <span class="spinner" id="fetchSpin" style="display:none"></span>
        <span id="fetchTxt">✨ Auto-fetch ALL product names</span>
      </button>
      <div class="edit-tabs" id="editTabs"></div>
      <div id="editBlocks"></div>
    </div>

    <!-- Categories section -->
    <div id="categoriesEditSection" style="display:none;">
      <p style="color:var(--muted);font-size:12px;margin-bottom:14px;">Rename, recolor, reorder or delete categories. Add new ones too.</p>
      <div class="cat-edit-list" id="catEditList"></div>
      <button class="add-cat-btn" onclick="addCatEdit()">+ Add New Category</button>
    </div>

    <div class="edit-actions">
      <button class="cancel-btn" onclick="closeEdit()">Cancel</button>
      <button class="save-btn" onclick="saveEdit()">💾 Save Changes</button>
    </div>
    <div class="logout-row">
      <button class="logout-lnk" onclick="doLogout()">Logout from admin</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const ADMIN_EMAIL = 'yoavmagal2011@gmail.com';
const ADMIN_PASS  = 'hutc2011';
let isAdmin = false;

const DEFAULT_CATS = [
  {id:'tech',    label:'Tech Gadgets', emoji:'⚡', color:'#3d9eff'},
  {id:'home',    label:'Home & Living', emoji:'🏠', color:'#ffb340'},
  {id:'fashion', label:'Fashion',       emoji:'👗', color:'#bf5af2'},
  {id:'beauty',  label:'Beauty',        emoji:'💄', color:'#ff6b9d'},
];

function loadCats(){
  try{const s=localStorage.getItem('ts_cats');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_CATS));}
  catch(e){return JSON.parse(JSON.stringify(DEFAULT_CATS));}
}
function saveCats(c){try{localStorage.setItem('ts_cats',JSON.stringify(c));}catch(e){}}

let CATS = loadCats();

// cat label lookup (dynamic)
function getCatLabel(id){const c=CATS.find(x=>x.id===id);return c?c.label:id;}
function getCatColor(id){const c=CATS.find(x=>x.id===id);return c?c.color:'#888';}
function getCatEmoji(id){const c=CATS.find(x=>x.id===id);return c?c.emoji:'📦';}

function loadData(){
  try{const s=localStorage.getItem('ts_v4');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULTS));}
  catch(e){return JSON.parse(JSON.stringify(DEFAULTS));}
}
function saveData(d){try{localStorage.setItem('ts_v4',JSON.stringify(d));}catch(e){}}

let data=loadData();
let activeFilter='all';
let searchQ='';
let editTab='tech';

// ── RENDER TABS ──
function renderTabs(){
  const tabsEl=document.getElementById('tabsEl');
  tabsEl.innerHTML=`<button class="tab${activeFilter==='all'?' active':''}" data-cat="all">🌟 All</button>`;
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='tab'+(activeFilter===cat.id?' active':'');
    btn.dataset.cat=cat.id;
    btn.textContent=cat.emoji+' '+cat.label;
    if(activeFilter===cat.id){btn.style.background=cat.color;btn.style.color=isLight(cat.color)?'#000':'#fff';btn.style.borderColor='transparent';}
    tabsEl.appendChild(btn);
  });
}

function isLight(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>128;
}

// ── RENDER ──
function allProducts(){
  let arr=[];
  CATS.forEach(c=>{(data[c.id]||[]).forEach(p=>arr.push({...p,catId:c.id}));});
  return arr;
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const noRes=document.getElementById('noResults');
  grid.innerHTML='';

  let prods=[];
  if(activeFilter==='all'){
    prods=allProducts();
  } else {
    prods=(data[activeFilter]||[]).map(p=>({...p,catId:activeFilter}));
  }

  if(searchQ.trim()){
    const q=searchQ.toLowerCase();
    prods=prods.filter(p=>p.name.toLowerCase().includes(q)||p.sub.toLowerCase().includes(q)||getCatLabel(p.catId).toLowerCase().includes(q));
  }

  if(!prods.length){
    noRes.style.display='block';
    return;
  }
  noRes.style.display='none';

  prods.forEach((p,i)=>{
    const isFeatured=p.featured;
    const a=document.createElement('a');
    a.href=p.url; a.target='_blank'; a.rel='noopener noreferrer';
    a.className='pcard'+(isFeatured?' featured':'');
    a.dataset.cat=p.catId;
    a.style.animationDelay=(i*.035)+'s';
    const color=getCatColor(p.catId);
    a.style.setProperty('--cc',color);

    const catLabel=getCatLabel(p.catId);
    a.innerHTML=`
      <div class="pcard-inner">
        <div class="pcard-cat" style="color:${color}">${catLabel}</div>
        <div class="pcard-name">${esc(p.name)}</div>
        <div class="pcard-foot">
          <span class="pcard-tag">AliExpress</span>
          <div class="pcard-arrow" style="background:${color}22;color:${color};border:1px solid ${color}44">→</div>
        </div>
      </div>
      ${p.hot?'<div class="hot-badge">🔥 Hot</div>':''}
    `;
    // top strip color
    a.style.setProperty('--strip-color', color);
    grid.appendChild(a);
  });
}

function onSearch(){
  searchQ=document.getElementById('searchBox').value;
  renderGrid();
}

document.getElementById('tabsEl').addEventListener('click',e=>{
  const t=e.target.closest('.tab');
  if(!t)return;
  activeFilter=t.dataset.cat;
  renderTabs();

});

// ── AUTH ──
function openLoginModal(){
  document.getElementById('loginModal').classList.add('open');
  setTimeout(()=>document.getElementById('mEmail').focus(),100);
}
function closeLoginModal(){
  document.getElementById('loginModal').classList.remove('open');
  document.getElementById('mErr').textContent='';
}
function doLogin(){
  const email=document.getElementById('mEmail').value.trim();
  const pass=document.getElementById('mPass').value.trim();
  const err=document.getElementById('mErr');
  if(!email||!pass){err.textContent='Fill in both fields.';return;}
  if(email.toLowerCase()===ADMIN_EMAIL&&pass===ADMIN_PASS){
    isAdmin=true;
    closeLoginModal();
    document.getElementById('adminOn').style.display='inline-flex';
    document.getElementById('adminCube').style.borderColor='var(--accent)';
    document.getElementById('adminCube').style.color='var(--accent)';
    document.getElementById('adminCube').textContent='✏️';
    document.getElementById('adminCube').onclick=openEdit;
  } else {
    err.textContent='❌ Wrong email or password.';
  }
}
function doLogout(){
  isAdmin=false;
  closeEdit();
  document.getElementById('adminOn').style.display='none';
  document.getElementById('adminCube').style.borderColor='';
  document.getElementById('adminCube').style.color='';
  document.getElementById('adminCube').textContent='⬛';
  document.getElementById('adminCube').onclick=openLoginModal;
  document.getElementById('mEmail').value='';
  document.getElementById('mPass').value='';
}
document.getElementById('mPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('mEmail').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── EDIT PANEL ──
function openEdit(){if(!isAdmin){openLoginModal();return;}currentEditMode='products';buildEditPanel();document.getElementById('editPanel').classList.add('open');switchEditMode('products');}
function closeEdit(){document.getElementById('editPanel').classList.remove('open');}

function buildEditPanel(){
  const tabs=document.getElementById('editTabs');
  const blocks=document.getElementById('editBlocks');
  tabs.innerHTML=''; blocks.innerHTML='';
  document.getElementById('fetchTxt').textContent='✨ Auto-fetch ALL product names';
  document.getElementById('fetchSpin').style.display='none';
  document.getElementById('fetchAllBtn').disabled=false;

  CATS.forEach(cat=>{
    const tab=document.createElement('button');
    tab.className='etab'+(cat.id===editTab?' active':'');
    tab.textContent=cat.emoji+' '+cat.label;
    tab.onclick=()=>{
      editTab=cat.id;
      document.querySelectorAll('.etab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.eblock').forEach(b=>b.classList.remove('active'));
      document.getElementById('eb_'+cat.id).classList.add('active');
    };
    tabs.appendChild(tab);

    const block=document.createElement('div');
    block.className='eblock'+(cat.id===editTab?' active':'');
    block.id='eb_'+cat.id;

    const list=document.createElement('div');
    list.className='elist'; list.id='el_'+cat.id;

    (data[cat.id]||[]).forEach((p,i)=>{
      const item=document.createElement('div');
      item.className='eitem';
      item.innerHTML=`
        <div class="eitem-hdr">
          <span class="eitem-num">${cat.emoji} · ${String(i+1).padStart(2,'0')}</span>
          <div class="eitem-acts">
            <button class="fbtn">✨ Fetch</button>
            <button class="dbtn">✕</button>
          </div>
        </div>
        <input class="ei" type="text" placeholder="Product name" value="${esc(p.name)}" data-field="name"/>
        <input class="ei" type="text" placeholder="Subtitle" value="${esc(p.sub||'')}" data-field="sub"/>
        <input class="ei" type="url"  placeholder="Product URL" value="${esc(p.url)}" data-field="url"/>
        <div class="hot-row">
          <input type="checkbox" id="h_${cat.id}_${i}" ${p.hot?'checked':''} data-field="hot"/>
          <label for="h_${cat.id}_${i}">🔥 Hot</label>
        </div>
        <div class="feat-row">
          <input type="checkbox" id="f_${cat.id}_${i}" ${p.featured?'checked':''} data-field="featured"/>
          <label for="f_${cat.id}_${i}">⭐ Featured (wide card)</label>
        </div>
      `;
      item.querySelector('.dbtn').onclick=()=>{data[cat.id].splice(i,1);buildEditPanel();};
      item.querySelector('.fbtn').onclick=()=>fetchSingle(cat.id,i);
      list.appendChild(item);
    });

    const addBtn=document.createElement('button');
    addBtn.className='add-btn';
    addBtn.textContent='+ Add Product';
    addBtn.onclick=()=>{
      if(!data[cat.id])data[cat.id]=[];
      data[cat.id].push({name:'New Product',sub:cat.label,url:'https://aliexpress.com',hot:false,featured:false});
      buildEditPanel();
      setTimeout(()=>{const l=document.getElementById('el_'+cat.id);if(l)l.scrollTop=l.scrollHeight;},50);
    };
    block.appendChild(list); block.appendChild(addBtn);
    blocks.appendChild(block);
  });
}

// ── EDIT MODE SWITCHER ──
let currentEditMode = 'products';
function switchEditMode(mode){
  currentEditMode=mode;
  document.getElementById('modeTabProducts').classList.toggle('active', mode==='products');
  document.getElementById('modeTabCats').classList.toggle('active', mode==='categories');
  document.getElementById('productsEditSection').style.display = mode==='products'?'block':'none';
  document.getElementById('categoriesEditSection').style.display = mode==='categories'?'block':'none';
  if(mode==='categories') buildCatEditPanel();
}

function buildCatEditPanel(){
  const list=document.getElementById('catEditList');
  list.innerHTML='';
  CATS.forEach((cat,i)=>{
    const item=document.createElement('div');
    item.className='cat-edit-item';
    item.innerHTML=`
      <div class="cat-edit-hdr">
        <span class="cat-edit-label">Category ${String(i+1).padStart(2,'0')}</span>
        <div class="cat-move-btns">
          <button class="move-btn" ${i===0?'disabled':''} onclick="moveCat(${i},-1)">↑</button>
          <button class="move-btn" ${i===CATS.length-1?'disabled':''} onclick="moveCat(${i},1)">↓</button>
          <button class="dbtn" onclick="deleteCat(${i})">✕</button>
        </div>
      </div>
      <input class="ei" type="text" placeholder="Category name" value="${esc(cat.label)}" data-cfield="label"/>
      <input class="ei" type="text" placeholder="Emoji (e.g. ⚡)" value="${esc(cat.emoji)}" data-cfield="emoji" style="max-width:120px"/>
      <div class="cat-color-row">
        <label>Color:</label>
        <input class="cat-color-input" type="color" value="${cat.color}" data-cfield="color"/>
        <span style="font-size:11px;color:var(--muted)">Accent color for this category</span>
      </div>
    `;
    list.appendChild(item);
  });
}

function moveCat(idx, dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=CATS.length)return;
  const tmp=CATS[idx]; CATS[idx]=CATS[newIdx]; CATS[newIdx]=tmp;
  buildCatEditPanel();
}

function deleteCat(idx){
  if(CATS.length<=1){alert('You need at least one category.');return;}
  if(!confirm(`Delete "${CATS[idx].label}"? Products in this category will be lost.`))return;
  const catId=CATS[idx].id;
  CATS.splice(idx,1);
  delete data[catId];
  buildCatEditPanel();
}

function addCatEdit(){
  const newId='cat_'+Date.now();
  CATS.push({id:newId, label:'New Category', emoji:'📦', color:'#888888'});
  data[newId]=[];
  buildCatEditPanel();
  setTimeout(()=>{
    const list=document.getElementById('catEditList');
    list.scrollTop=list.scrollHeight;
  },50);
}

function saveCatEdits(){
  const items=document.querySelectorAll('.cat-edit-item');
  items.forEach((item,i)=>{
    if(!CATS[i])return;
    CATS[i].label=item.querySelector('[data-cfield="label"]').value.trim()||CATS[i].label;
    CATS[i].emoji=item.querySelector('[data-cfield="emoji"]').value.trim()||CATS[i].emoji;
    CATS[i].color=item.querySelector('[data-cfield="color"]').value;
  });
  saveCats(CATS);
}

function saveEdit(){
  if(currentEditMode==='categories'){
    saveCatEdits();
    renderTabs();
    renderGrid();
    closeEdit();
    return;
  }

  CATS.forEach(cat=>{
    const list=document.getElementById('el_'+cat.id);
    if(!list)return;
    data[cat.id]=Array.from(list.querySelectorAll('.eitem')).map(item=>({
      name:item.querySelector('[data-field="name"]').value.trim()||'Product',
      sub:item.querySelector('[data-field="sub"]').value.trim(),
      url:item.querySelector('[data-field="url"]').value.trim(),
      hot:item.querySelector('[data-field="hot"]').checked,
      featured:item.querySelector('[data-field="featured"]').checked,
    }));
  });
  saveData(data);
  renderTabs();
  renderGrid();
  closeEdit();
}

// ── AUTO FETCH via Claude API ──
async function fetchName(url){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:60,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`Search for this AliExpress short URL and return only the product name: ${url}\n\nRules: Reply with ONLY 2-5 word product name. No quotes, no explanation, no punctuation at end. Make it short and clean for a product card.`}]
      })
    });
    const json=await res.json();
    const text=(json.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    return text||null;
  }catch(e){return null;}
}

async function fetchAllNames(){
  const btn=document.getElementById('fetchAllBtn');
  const spin=document.getElementById('fetchSpin');
  const txt=document.getElementById('fetchTxt');
  btn.disabled=true; spin.style.display='inline-block';
  let total=0,done=0;
  CATS.forEach(cat=>{const l=document.getElementById('el_'+cat.id);if(l)total+=l.querySelectorAll('.eitem').length;});
  for(const cat of CATS){
    const list=document.getElementById('el_'+cat.id);
    if(!list)continue;
    const items=list.querySelectorAll('.eitem');
    for(let i=0;i<items.length;i++){
      const item=items[i];
      const urlIn=item.querySelector('[data-field="url"]');
      const nameIn=item.querySelector('[data-field="name"]');
      const fb=item.querySelector('.fbtn');
      if(fb){fb.disabled=true;fb.innerHTML='<span class="spinner"></span>';}
      txt.textContent=`Fetching… (${done+1}/${total})`;
      const name=await fetchName(urlIn.value.trim());
      if(name)nameIn.value=name;
      done++;
      if(fb){fb.disabled=false;fb.textContent='✨ Fetch';}
    }
  }
  btn.disabled=false; spin.style.display='none';
  txt.textContent='✅ Done! Review names & save.';
  setTimeout(()=>{txt.textContent='✨ Auto-fetch ALL product names';},5000);
}

async function fetchSingle(catId,idx){
  const list=document.getElementById('el_'+catId);
  if(!list)return;
  const item=list.querySelectorAll('.eitem')[idx];
  if(!item)return;
  const urlIn=item.querySelector('[data-field="url"]');
  const nameIn=item.querySelector('[data-field="name"]');
  const fb=item.querySelector('.fbtn');
  fb.disabled=true; fb.innerHTML='<span class="spinner"></span>';
  const name=await fetchName(urlIn.value.trim());
  if(name)nameIn.value=name;
  fb.disabled=false; fb.textContent='✨ Fetch';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
